<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para meu amigo Ivan ❤️</title>
    <link rel="stylesheet" href="estilo.css">
  </head>

  <body>
    <div class="container">
      <h1>💖 Ivan Gabriel (PEQUENO) 💖</h1>
      <button id="heart-btn">❤️ Enviar Amor</button>

      <p class="mensagem">
        Favor ganhar o jifeng, vc e um bom amigo! 💕
      </p>

      <p class="assinatura">  
        Com carinho,<br>
        Lázaro Martins Rodrigues
      </p>

      <!-- 🏀 MINI JOGO -->
      <div class="jogo">
        <div class="cesta">🧺</div>
        <div class="bola" draggable="true">🏀</div>
      </div>
    </div>

    <script>
      const button = document.getElementById('heart-btn');

      button.addEventListener('click', () => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.textContent = '❤️';

        heart.style.left = (Math.random() * window.innerWidth) + 'px';

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 2000);
      });

      // 🏀 LÓGICA DO JOGO
      const bola = document.querySelector('.bola');
      const cesta = document.querySelector('.cesta');

      bola.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData("text/plain", "bola");
      });

      cesta.addEventListener('dragover', (e) => {
        e.preventDefault();
      });

      cesta.addEventListener('drop', () => {
        alert("🏀 CESTA! 🔥");
      });
    </script>
  </body>
</html>
