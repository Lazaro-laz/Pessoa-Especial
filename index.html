<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para meu amigo Ivan</title>

  <style>
    body {
      background: 
        linear-gradient(
          rgba(0, 0, 0, 0.5), 
          rgba(0, 0, 0, 0.7)
        ),
        url("https://images.unsplash.com/photo-1546519638-68e109498ffc");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    h1 {
      color: #ff4d6d;
    }

    .mensagem {
      font-size: 20px;
      color: #e26db3;
    }

    .assinatura {
      margin-top: 20px;
      color: #c94db0;
    }

    #heart-btn {
      background-color: #ff4d6d;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 30px;
    }

    /* Bolas decorativas fixas */
    .bola {
      position: fixed;
      font-size: 40px;
      opacity: 0.7;
    }

    .bola1 {
      bottom: 20px;
      left: 30px;
    }

    .bola2 {
      top: 100px;
      right: 50px;
    }

    /* Bolas criadas pelo botão */
    .bola-random {
      position: fixed;
      font-size: 30px;
      pointer-events: none;
    }

    /* Área do jogo */
    .game-area {
      position: relative;
      width: 100%;
      height: 300px;
      margin-top: 40px;
    }

    /* Bola arrastável */
    #ball {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 50px;
      cursor: grab;
      user-select: none;
    }

    #ball:active {
      cursor: grabbing;
    }

    /* Cesta */
    #hoop {
      position: absolute;
      top: 20px;
      right: 20%;
      width: 120px;
      height: 120px;
      background-image: url("https://cdn-icons-png.flaticon.com/512/889/889455.png");
      background-size: contain;
      background-repeat: no-repeat;
    }

  </style>
</head>

<body>

  <!-- Bolas decorativas -->
  <div class="bola bola1">🏀</div>
  <div class="bola bola2">🏀</div>

  <div class="container">
    <h1>Ivan Gabriel (PEQUENO)</h1>

    <button id="heart-btn">🏀 Enviar Respeito</button>

    <p class="mensagem">
      Favor ganhar o jifeng, vc é um bom amigo!
    </p>

    <p class="assinatura">
      Com carinho,<br>
      Lázaro Martins Rodrigues
    </p>

    <div class="game-area">
      <div id="ball">🏀</div>
      <div id="hoop"></div>
    </div>
  </div>

  <script>
    const button = document.getElementById('heart-btn');

    // Criar bolas aleatórias
    button.addEventListener('click', () => {
      for (let i = 0; i < 5; i++) {
        const bola = document.createElement('div');
        bola.classList.add('bola-random');
        bola.textContent = '🏀';

        bola.style.left = Math.random() * window.innerWidth + 'px';
        bola.style.top = Math.random() * window.innerHeight + 'px';

        document.body.appendChild(bola);
      }
    });

    // Arrastar bola principal
    const ball = document.getElementById("ball");
    let isDragging = false;

    ball.addEventListener("mousedown", () => {
      isDragging = true;
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
    });

    document.addEventListener("mousemove", (e) => {
      if (isDragging) {
        ball.style.left = e.clientX - 25 + "px";
        ball.style.top = e.clientY - 25 + "px";
      }
    });
  </script>

</body>
</html>
